{% extends 'core/base.html' %}
{% block title %}{{ page.title }} — {{ site_settings.church_name }}{% endblock %}

{% block content %}
<section class="page-hero">
    {% if page.cover %}
    <div class="page-hero-bg" style="background-image: url('{{ page.cover.url }}');"></div>
    {% endif %}
    <div class="page-hero-content">
        <h1>{{ page.title }}</h1>
    </div>
</section>

<section class="section-light" style="padding: 3rem 0;">
    <div class="container-fluid" style="max-width: 1200px; margin: 0 auto; padding: 0 1.5rem;">
        <div class="dynamic-page-body prose">
            {{ page.content|safe }}
        </div>
    </div>
</section>
{% endblock %}
