{% load static %}
<!DOCTYPE html>
<html lang="pt-BR" data-theme="">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Requisição inválida</title>
  <link rel="icon" type="image/png" href="{% static 'img/logo_icone.png' %}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
  <style>
    .error-page { min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--ivory,#FAF7F2);padding:2rem; }
    .error-card { text-align:center;max-width:520px;width:100%; }
    .error-code { font-family:'Cormorant Garamond',serif;font-size:clamp(6rem,20vw,10rem);font-weight:600;color:var(--gold,#C9A84C);line-height:1;margin:0;opacity:.25;letter-spacing:-.02em; }
    .error-icon { width:80px;height:80px;border-radius:50%;background:rgba(243,156,18,.1);display:flex;align-items:center;justify-content:center;margin:-1rem auto 1.5rem;font-size:2rem;color:#946b00; }
    .error-title { font-family:'Cormorant Garamond',serif;font-size:1.9rem;font-weight:500;color:var(--navy,#1A2340);margin:0 0 .75rem; }
    .error-msg { color:var(--text-muted,#6B6B6B);font-size:.95rem;line-height:1.7;margin:0 0 2rem; }
    .error-actions { display:flex;gap:.75rem;justify-content:center;flex-wrap:wrap; }
    .error-logo { width:52px;margin-bottom:1rem;opacity:.6; }
    [data-theme="dark"] .error-page  { background:#0E0E12; }
    [data-theme="dark"] .error-title { color:#E8E4DC; }
  </style>
</head>
<body>
<div class="error-page">
  <div class="error-card">
    <img src="{% static 'img/logo_icone.png' %}" alt="Logo" class="error-logo">
    <div class="error-code">400</div>
    <div class="error-icon"><i class="fa fa-circle-xmark"></i></div>
    <h1 class="error-title">Requisição inválida</h1>
    <p class="error-msg">
      A solicitação enviada não pôde ser processada.<br>
      Isso pode acontecer quando a sessão expira ou o formulário é enviado incorretamente.
    </p>
    <div class="error-actions">
      <a href="/" class="btn btn-primary">
        <i class="fa fa-house"></i> Ir para o início
      </a>
      <a href="javascript:history.back()" class="btn btn-outline">
        <i class="fa fa-arrow-left"></i> Voltar
      </a>
    </div>
  </div>
</div>
<script>
  var t = localStorage.getItem('church_theme') || '';
  if (t) document.documentElement.setAttribute('data-theme', t);
</script>
</body>
</html>
