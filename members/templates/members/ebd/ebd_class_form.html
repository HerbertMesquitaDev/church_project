{% extends 'members/base_members.html' %}
{% block title %}{{ title }} — EBD{% endblock %}
{% block page_title %}{{ title }}{% endblock %}
{% block content %}
<div class="form-page-wrap" style="max-width:560px">

  <div style="display:flex;align-items:center;gap:.5rem;font-size:.85rem;margin-bottom:1.5rem" class="text-muted">
    <a href="{% url 'ebd_manage' %}" style="color:var(--gold);text-decoration:none"><i class="fa fa-users"></i> Turmas</a>
    <i class="fa fa-chevron-right" style="font-size:.65rem"></i>
    <span>{{ title }}</span>
  </div>

  <form method="post">
    {% csrf_token %}
    <div class="form-section-title">Dados da Turma</div>
    <div class="form-group">
      <label>Nome da Turma *</label>
      <input type="text" name="name" class="form-input" value="{{ cls.name|default:'' }}" placeholder="Ex: Adultos, Jovens, Infantil..." required>
    </div>
    <div class="form-group">
      <label>Descrição</label>
      <textarea name="description" class="form-input" rows="3" placeholder="Descreva a turma...">{{ cls.description|default:'' }}</textarea>
    </div>
    <div class="form-group">
      <label>Ordem de exibição</label>
      <input type="number" name="order" class="form-input" value="{{ cls.order|default:'0' }}" min="0" style="max-width:100px">
    </div>
    <div class="form-check-group form-group">
      <input type="checkbox" id="active" name="active" {% if cls.active|default:True %}checked{% endif %}>
      <label for="active">Turma ativa</label>
    </div>
    <div class="form-actions">
      <button type="submit" class="btn btn-primary"><i class="fa fa-save"></i> Salvar</button>
      <a href="{% url 'ebd_manage' %}" class="btn btn-outline">Cancelar</a>
    </div>
  </form>
</div>
{% endblock %}
