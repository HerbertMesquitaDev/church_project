{% extends 'members/base_members.html' %}
{% block title %}{{ title }}{% endblock %}
{% block page_title %}{{ title }}{% endblock %}

{% block content %}
<div class="form-page-wrap">
    <form method="post" class="members-form">
        {% csrf_token %}
        <div class="form-group"><label>Título</label>{{ form.title }}</div>
        <div class="form-group"><label>Texto do Aviso</label>{{ form.body }}</div>
        <div class="form-grid">
            <div class="form-group"><label>Prioridade</label>{{ form.priority }}</div>
            <div class="form-group"><label>Expira em</label>{{ form.expires_at }}</div>
        </div>
        <div class="form-check-group form-group">{{ form.published }}<label for="{{ form.published.id_for_label }}">Publicado</label></div>
        <div style="display:flex;gap:1rem;margin-top:1rem">
            <button type="submit" class="btn btn-primary">Salvar</button>
            <a href="{% url 'notice_list' %}" class="btn btn-outline">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
